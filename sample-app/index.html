<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blocks App</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 860px; margin: 40px auto; padding: 20px; color: #333; }
    h1 { margin-bottom: 4px; }
    .intro { color: #666; font-size: 0.9em; margin-bottom: 24px; line-height: 1.5; }
    .intro strong { color: #444; }
    input, textarea, select { padding: 8px; margin: 4px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.95em; }
    input[type="text"], input[type="email"], input[type="password"] { min-width: 220px; }
    button { padding: 8px 16px; margin: 4px; cursor: pointer; border: 1px solid #ddd; border-radius: 4px; background: #f8f8f8; font-size: 0.95em; }
    button:hover { background: #eee; }
    ul { padding: 0; }
    li { list-style: none; }
  </style>
</head>
<body>
  <div id="menu-bar"></div>
  <h1>Blocks App</h1>
  <p class="intro">
    This starter app demonstrates:
    <strong>authentication</strong> with cross-tab coordination,
    <strong>real-time sync</strong> across browser tabs,
    and <strong>todos stored in a distributed table</strong> with secondary index queries.
  </p>
  <p id='signInMessage'>Sign in to get started.</p>
  <div id="auth"></div>
  <div id="app"></div>
  <script type="module" src="/src/index.ts"></script>
</body>
</html>
